<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J_Direcionamento - Cadastro</title>
    <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* FUNDO IGUAL À OUTRA TELA */
body{
background: linear-gradient(135deg,#0a4da2,#3a7bd5,#f5b932);
background-size:300% 300%;
animation: gradientMove 10s ease infinite;
color:#333;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* CONTAINER EM FORMA DE CARTÃO */
.container{
max-width:400px;
width:100%;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

/* Link Voltar */

.back-link{
color:#666;
text-decoration:none;
display:flex;
align-items:center;
font-size:0.9rem;
margin-bottom:30px;
}

/* Logo */

.logo-box{
background-color:#0a4da2;
width:60px;
height:60px;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:20px;
color:white;
font-size:28px;
}

/* Título */

h1{
font-size:1.8rem;
color:#000;
margin-bottom:5px;
}

.subtitle{
color:#888;
margin-bottom:40px;
font-size:1rem;
}

/* Formulário */

.form-group{
margin-bottom:25px;
}

label{
display:block;
font-weight:600;
margin-bottom:10px;
color:#111;
}

.input-wrapper{
position:relative;
display:flex;
align-items:center;
}

.input-wrapper span{
position:absolute;
left:15px;
color:#999;
}

input,select{
width:100%;
padding:15px 15px 15px 45px;
border:1px solid #e0e0e0;
border-radius:12px;
font-size:1rem;
background-color:#fff;
outline:none;
appearance:none;
transition:0.2s;
}

/* foco bonito */

input:focus,select:focus{
border-color:#0a4da2;
box-shadow:0 0 0 2px rgba(10,77,162,0.1);
}

/* Botão */

.btn-continue{
background-color:#8da9c4;
color:white;
width:100%;
padding:18px;
border-radius:12px;
border:none;
font-weight:bold;
font-size:1rem;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:10px;
transition:0.2s;
}

.btn-continue.active{
background-color:#0a4da2;
}

/* Rodapé */

footer{
margin-top:40px;
text-align:center;
font-size:0.8rem;
color:#999;
line-height:1.4;
}

/* Ícones educativos no fundo */

.bg-icons{
position:fixed;
bottom:20px;
right:20px;
font-size:28px;
opacity:0.12;
}
.link-clean {
    color: #888888;          /* Um cinza médio, podes ajustar */
    text-decoration: none;   /* Remove o sublinhado */
    font-size: 0.9rem;       /* Tamanho ligeiramente menor para ser discreto */
    transition: color 0.3s;  /* Suaviza a mudança de cor ao passar o rato */
}

/* Opcional: Efeito ao passar o rato (hover) */
.link-clean:hover {
    color: #bbbbbb;          /* Fica um cinza mais claro ao tocar/passar o rato */
    text-decoration: underline; /* Opcional: sublinhado apenas no hover */
}

.btn-voltar {
            position: fixed;
            bottom: 25px;
            left: 25px;
            z-index: 10000;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 50px;
            background: #06126e00;
            border: 2px solid #ffffff;
            transition: 0.3s;
        }

        .btn-voltar:hover { 
            background: #040e69; 
            color: #ffffff; 
            transform: scale(1.05); 
            border: 2px solid #ffffff00;
        }
        
</style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-voltar">⬅ Voltar a página inicial</a>
      

        <div class="logo-box">
            🎓
        </div>

        <h1>J_Direcionamento</h1>
        <p class="subtitle">Orientação estudantil para escolhade curso</p>

        <form id="regForm">
            <div class="form-group">
                <label>Nome do estudante</label>
                <div class="input-wrapper">
            <span>👤</span>
            <input 
               
    type="text" 
    id="nome" 
    placeholder="Digite primeiro e último nome" 
    oninput="this.value = this.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, '').replace(/\s{2,}/g, ' ')"
    pattern="^[a-zA-ZÀ-ÿ]+(\s[a-zA-ZÀ-ÿ]+)+$"
    title="Digite pelo menos o primeiro e o último nome, sem números ou caracteres especiais."
    required
>
            
        </div>
            </div>

            <div class="form-group">
                <label>Município onde mora</label>
                <div class="input-wrapper">
                    <span>📍</span>
                    <select id="municipio" required>
                        <option value="" disabled selected>Selecione o município</option>
                        <option value="belas">Belas</option>
                        <option value="cacuaco">Cacuaco</option>
                        <option value="cazenga">Cazenga</option>
                        <option value="Icolo e Bengo">Icolo e Bengo</option>
                        <option value="Kilamba Kiaxi">Kilamba Kiaxi</option>
                        <option value="Luanda">Luanda</option>
                        <option value="Talatona">Talatona</option>
                        <option value="Quiçama">Quiçama</option>
                        <option value="viana">Viana</option>
                    </select>
                </div>
            </div>
       
            <button type="submit" class="btn-continue" id="submitBtn" href="\h3.html">
               Continuar
            </button>
        </form>

        <footer>
            Direcionamento estudantil para institutos médios públicos de Luanda
        </footer>
    </div>
<div class="bg-icons">
🎓 📚 💡 🧠 💻 🌱 ⚙️
</div>
    <script>
    const nomeInput = document.getElementById('nome');
    const municipioSelect = document.getElementById('municipio');
    const submitBtn = document.getElementById('submitBtn');

    // Função para ativar o botão apenas quando campos estiverem preenchidos
    function checkInputs() {
        if (nomeInput.value.trim() !== "" && municipioSelect.value !== "") {
            submitBtn.classList.add('active');
        } else {
            submitBtn.classList.remove('active');
        }
    }

    nomeInput.addEventListener('input', checkInputs);
    municipioSelect.addEventListener('change', checkInputs);

    document.getElementById('regForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        if(submitBtn.classList.contains('active')) {
            // --- AS LINHAS MÁGICAS ESTÃO AQUI ---
            // Guardamos o nome exatamente com a chave que o resto do sistema espera
            localStorage.setItem('nomeUsuario', nomeInput.value.trim());
            localStorage.setItem('municipioUsuario', municipioSelect.value);
            // ------------------------------------

            window.location.href = "h3.html"; // h3 deve ser o início das perguntas
        }
    });
</script>

</body>
</html>
