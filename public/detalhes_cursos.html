        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

    // 2. VARIÁVEL GLOBAL PARA ARMAZENAR DADOS DA NUVEM
    let institutosDaNuvem = [];

    // window.onload: inicializa a página de cursos, carrega cursos e institutos.
    window.onload = () => {
        const area = localStorage.getItem('areaSelecionada');
        const container = document.getElementById('lista-detalhes');
        const cursos = baseCursos[area] || [];

        if (cursos.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>Escolha uma área na tela anterior.</p>";
            return;
        }

        // Carregar institutos do Firebase assim que a página abrir
        db.collection("Institutos").get().then((querySnapshot) => {
            institutosDaNuvem = [];
            querySnapshot.forEach((doc) => {
                institutosDaNuvem.push(doc.data());
            });
        });

        cursos.forEach(c => {
            container.innerHTML += `
                <div class="detail-card">
                    <div>
                        <div class="course-title">${c.nome}</div>
                        <div class="description">${c.desc}</div>
                        <div class="institute-info">📍 ${c.inst}</div>
                    </div>

   // abrirSelecaoEscola: abre o modal com a lista de institutos que oferecem o curso.
   function abrirSelecaoEscola(curso, instBase) {
    const nomeAlu = localStorage.getItem('nomeUsuario') || "Estudante";
    
    // 1. FILTRAGEM DINÂMICA: Procura no Firebase quem oferece este curso
    const cursoLimpo = curso.toLowerCase().replace("técnico de ", "").trim();
    const areaAtu = localStorage.getItem('areaSelecionada');
    
    let instsFiltrados = institutosDaNuvem.filter(inst => {
        const cursosDoInst = String(inst.cursos).toLowerCase();
        const nomeInst = inst.nome.toLowerCase();

        // Desconectar Agronomia de institutos genéricos: exige termo "agrário" ou curso específico na BD
        if (areaAtu === 'agronomia') {
            return cursosDoInst.includes(cursoLimpo) || nomeInst.includes('agrário') || nomeInst.includes('ima');
        }

        return cursosDoInst.includes(cursoLimpo) || (instBase !== "" && inst.nome.includes(instBase.split(" ")[0]));
    });

    // 2. ORDENAÇÃO POR PROXIMIDADE: Município igual ao do aluno primeiro
    instsFiltrados.sort((a, b) => {
        const aMatch = a.mun.toLowerCase().includes(muniAlu);
        const bMatch = b.mun.toLowerCase().includes(muniAlu);
        return (aMatch === bMatch) ? 0 : aMatch ? -1 : 1;
    });

                <div class="user-info-bar">👤 <b>${nomeAlu}</b> | 📍 <b>${muniAlu}</b></div>`;

// aplicarMascaraBI: formata automaticamente o BI do candidato no formato angolano.
function aplicarMascaraBI(input) {
    let v = input.value.toUpperCase().replace(/\s/g, "");
    let formatado = "";
    for (let i = 0; i < v.length; i++) {
        if (i < 9) { // 0-8: Números
            if (/[0-9]/.test(v[i])) formatado += v[i];
        } else if (i >= 9 && i <= 10) { // 9-10: Letras
            if (/[A-Z]/.test(v[i])) formatado += v[i];
        } else if (i >= 11) { // 11-13: Números
            if (/[0-9]/.test(v[i])) formatado += v[i];
        }
    }
    input.value = formatado.slice(0, 14);
}

function biValido(bi) {
    // Padrão Angolano: 9 números + 2 letras + 3 números
    const regexBI = /^[0-9]{9}[A-Z]{2}[0-9]{3}$/;
    return regexBI.test(bi);
}

// validarERegistar: faz validações completas do formulário do candidato e registra no Firebase.
async function validarERegistar(estudante, muni, curso, inst) {
    const biCand = document.getElementById('biCandidato').value.toUpperCase().trim();
    const confBiCand = document.getElementById('confBiCandidato').value.toUpperCase().trim();
    const respNome = document.getElementById('respNome').value.trim();
    const respBI = document.getElementById('respBI').value.toUpperCase().trim();
    const dataNasc = document.getElementById('dataNascResp').value;
    let email = document.getElementById('userEmail').value.trim();
    const tel = document.getElementById('userTel').value.trim();
    const erroDiv = document.getElementById('erroInscricao');

    const mostrarErro = (msg) => {
        erroDiv.innerText = msg;
        erroDiv.style.display = 'block';
        erroDiv.scrollIntoView();
    };

    // 1. Validar campos vazios
    if (!biCand || !respNome || !respBI || !dataNasc || !email || !tel) {
        mostrarErro("⚠️ Por favor, preencha todos os campos obrigatórios.");
        return;
    }

    // 2. Lógica de E-mail: Adicionar @gmail.com se o usuário não incluir um domínio
    if (!email.includes('@')) {
        email += "@gmail.com";
    }
    // Validação simples de formato de e-mail
    const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!regexEmail.test(email)) {
        mostrarErro("❌ O formato do e-mail não é válido.");
        return;
    }

    // 3. Validação dos BIs (Candidato vs Encarregado)
    const nomesIguais = (estudante.toLowerCase() === respNome.toLowerCase());
    
    if (nomesIguais) {
        // Se o nome é o mesmo, o BI deve ser o mesmo
        if (biCand !== respBI) {
            mostrarErro("❌ Como o aluno é o próprio encarregado, os BIs devem ser idênticos.");
            return;
        }
    } else {
        // Se o nome é diferente, o BI NÃO PODE ser o mesmo
        if (biCand === respBI) {
            mostrarErro("❌ O BI do aluno não pode ser igual ao do encarregado se forem pessoas diferentes.");
            return;
        }
    }

    // 4. Validações de Formato e Regras Gerais
    if (!biValido(biCand)) {
        mostrarErro("❌ O BI do Candidato parece inválido (Ex: 000000000LA000).");
        return;
    }

    if (biCand !== confBiCand) {
        mostrarErro("❌ Os números do BI do candidato não coincidem.");
        return;
    }

    if (tel.length < 9) {
        mostrarErro("❌ O número de telefone deve ter 9 dígitos.");
        return;
    }

    // 5. Validação de Idade (Encarregado > 18)
    const nascimento = new Date(dataNasc);
    const hoje = new Date();
    let idade = hoje.getFullYear() - nascimento.getFullYear();
    const mesDif = hoje.getMonth() - nascimento.getMonth();
    if (mesDif < 0 || (mesDif === 0 && hoje.getDate() < nascimento.getDate())) idade--;

    if (idade < 18) {
        mostrarErro("❌ O Encarregado de Educação deve ter pelo menos 18 anos.");
        return;
    }

    // 6. Processamento no Firebase
    try {
        const numRupe = Math.floor(Math.random() * 900000000000 + 100000000000); 
        
        await db.collection("InscricoesOficiais").add({
            candidato: estudante,
            bi_candidato: biCand,
            curso: curso,
            instituto: inst,
            municipio_aluno: muni,
            email_contato: email,
            telefone_contato: tel,
            encarregado: respNome,
            bi_encarregado: respBI,
            rupe: numRupe,
            status_pagamento: "Pendente",
            data: firebase.firestore.FieldValue.serverTimestamp()
        });

        exibirRUPE(numRupe, estudante, curso);
    } catch (e) {
        alert("Erro na conexão. Verifique a sua internet.");
        console.error(e);
    }
} // Localiza a função exibirRUPE no teu código e altera esta parte:
