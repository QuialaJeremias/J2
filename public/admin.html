<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Administrador</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .admin-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .admin-icon {
            background-color: #ebf2fa;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0a4da2;
            font-size: 35px;
        }

        h1 { font-size: 1.8rem; color: #051326; margin-bottom: 15px; }
        p { color: #888; font-size: 0.95rem; line-height: 1.5; margin-bottom: 40px; padding: 0 20px; }

        .password-input {
            width: 100%;
            padding: 18px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 30px;
            outline: none;
            color: #333;
            transition: border-color 0.3s;
        }

        .password-input:focus { border-color: #0a4da2; }

        .forgot-link {
            display: block;
            margin-top: -20px;
            margin-bottom: 30px;
            text-align: right;
            color: #0a4da2;
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-link:hover { text-decoration: underline; }

        .button-group { display: flex; gap: 15px; }

        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .btn-back {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            color: #333;
        }

        .btn-enter {
            background-color: #0a4da2;
            border: none;
            color: #fff;
        }

        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .modal h2 { font-size: 1.4rem; margin-bottom: 10px; color: #051326; }
        .modal p { margin-bottom: 20px; font-size: 0.9rem; }
    </style>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="admin-container">
        <div class="admin-icon">👤</div>

        <h1>Área do Administrador</h1>
        <p>Faça login com o seu e-mail e senha. Os dados serão validados na coleção <strong>Administradores</strong> do Firestore.</p>

        <form id="adminForm">
            <input type="email" class="password-input" placeholder="E-mail" id="emailField" required>
            <input type="password" class="password-input" placeholder="Senha" id="passField" required>
            
            <a href="#" class="forgot-link" onclick="abrirModalRecuperar()">Esqueceu a senha?</a>

            <div class="button-group">
                <a href="index.html" class="btn btn-back">← &nbsp; Voltar</a>
                <button type="submit" class="btn btn-enter">Entrar</button>
            </div>
        </form>
    </div>

    <div id="modalRecuperar" class="modal">
        <div class="modal-content">
            <h2>Recuperar Senha</h2>
            <p>Introduza o seu e-mail de administrador para receber a sua senha.</p>
            <input type="email" id="emailRecuperar" class="password-input" placeholder="Seu e-mail cadastrado">
            <button class="btn btn-enter" style="width:100%;" id="btnEnviarRecuperacao" onclick="enviarSenhaPorEmail()">Enviar Senha</button>
            <button class="btn btn-back" style="width:100%; margin-top:10px;" onclick="fecharModalRecuperar()">Cancelar</button>
        </div>
    </div>

    <script>
        /*
            admin.html
            ----------
            Página de login dos administradores. Valida credenciais contra a
            coleção 'Administradores' no Firestore e cria o contexto de sessão em
            localStorage. Inclui recuperação de senha via EmailJS.
        */

        const firebaseConfig = {
            apiKey: "AIzaSyA8230FDOPHlxSrTaGzB1KFruiaoKmFOq0",
            authDomain: "j-direcionamento.firebaseapp.com",
            projectId: "j-direcionamento",
            storageBucket: "j-direcionamento.appspot.com",
            messagingSenderId: "288532637574",
            appId: "1:288532637574:web:5a08a03c426204ed7b6e07"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        (function() { emailjs.init("dKuLDomo0CwusPKLt"); })();

        function abrirModalRecuperar() {
            document.getElementById('modalRecuperar').style.display = 'flex';
        }

        function fecharModalRecuperar() {
            document.getElementById('modalRecuperar').style.display = 'none';
        }

        async function enviarSenhaPorEmail() {
            const email = document.getElementById('emailRecuperar').value.trim().toLowerCase();
            const btn = document.getElementById('btnEnviarRecuperacao');

            if (!email) return alert("Por favor, digite o seu e-mail.");

            btn.disabled = true;
            btn.innerText = "⏳ A verificar...";

            try {
                const snapshot = await db.collection('Administradores')
                    .where('email', '==', email)
                    .limit(1)
                    .get();

                if (snapshot.empty) {
                    alert("E-mail não encontrado no sistema.");
                } else {
                    const data = snapshot.docs[0].data();
                    let senhaOriginal = "";

                    if (data.senhaHash) {
                        try {
                            senhaOriginal = atob(data.senhaHash);
                        } catch(e) {
                            senhaOriginal = "Senha encriptada (contacte o Master)";
                        }
                    } else {
                        senhaOriginal = data.senha || "Não definida";
                    }

                    await emailjs.send("jeremiasquiala", "template_akkmhr9", {
                        to_email: email,
                        to_name: data.nome || "Administrador",
                        message: `Olá, recebemos um pedido de recuperação de acesso.\n\nA sua senha de acesso ao Painel Admin é: ${senhaOriginal}\n\nPor favor, mantenha esta informação segura.`
                    });

                    await db.collection("HistoricoMensagens").add({
                        aluno: data.nome || "Admin Recovery",
                        email: email,
                        msg: "Recuperação de senha enviada automaticamente.",
                        data: new Date()
                    });

                    alert("✅ Sucesso! A sua senha foi enviada para o e-mail introduzido.");
                    fecharModalRecuperar();
                }
            } catch (error) {
                console.error(error);
                alert("Erro ao processar pedido: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Senha";
            }
        }

        const fallbackAdmins = [
            {
                email: 'jeremiasquiala10@gmail.com',
                senha: '12345',
                nivel: 'master',
                instituto_id: '',
                nome_admin: 'Administrador Master'
            }
        ];

        document.getElementById('adminForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('emailField').value.trim().toLowerCase();
            const pass = document.getElementById('passField').value.trim();

            if (!email || !pass) {
                return alert('Preencha e-mail e senha.');
            }

            try {
                const snapshot = await db.collection('Administradores')
                    .where('email', '==', email)
                    .limit(1)
                    .get();

                let adminData = null;
                let senhaCorreta = false;
                
                if (!snapshot.empty) {
                    adminData = snapshot.docs[0].data();
                    const senhaHash = btoa(pass);
                    senhaCorreta = (adminData.senhaHash === senhaHash || adminData.senha === pass);
                } else {
                    adminData = fallbackAdmins.find(item => item.email === email && item.senha === pass) || null;
                    senhaCorreta = adminData !== null;
                }

                if (!adminData || !senhaCorreta) {
                    alert('Credenciais inválidas. Verifique o e-mail e a senha.');
                    document.getElementById('passField').value = '';
                    document.getElementById('passField').focus();
                    return;
                }

                if (adminData.ativo === false) {
                    alert('Este administrador está inativo.');
                    return;
                }

                const nivel = (adminData.nivel || '').toLowerCase();
                const instituto_id = adminData.institutoId || adminData.instituto_id || '';
                const nome_admin = adminData.nome_admin || adminData.nome || email;
                const admin_id = !snapshot.empty ? snapshot.docs[0].id : 'local-fallback';
                const admin_email = adminData.email || email;

                if (nivel !== 'master' && nivel !== 'moderador' && nivel !== 'visualizador') {
                    throw new Error('Nível de administrador inválido.');
                }
                if (nivel !== 'master' && !instituto_id) {
                    throw new Error('O administrador precisa ter um instituto associado.');
                }

                localStorage.setItem('nivel', nivel);
                localStorage.setItem('instituto_id', instituto_id);
                localStorage.setItem('nome_admin', nome_admin);
                localStorage.setItem('admin_id', admin_id);
                localStorage.setItem('admin_email', admin_email);
                window.location.href = 'admin2.html';
            } catch (error) {
                console.error(error);
                alert('Erro ao efetuar login: ' + (error.message || 'Tente novamente.'));
            }
        });
    </script>

</body>
</html>
