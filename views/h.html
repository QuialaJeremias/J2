    const STORAGE_KEY = 'base_institutos_uni';
    const grid = document.getElementById('grid');
    const modal = document.getElementById('instModal');
    const userMun = localStorage.getItem('municipio') || "";

    // 2. LÓGICA DE CARREGAMENTO (Híbrida: Admin + Padrão)
    function obterBaseDeDados() {
        const dadosAdmin = JSON.parse(localStorage.getItem(STORAGE_KEY));
        
        // Se o Admin salvou algo, usamos os dados dele. Se não, usamos o padrão.
        // Importante: Se o Admin limpou tudo, ele volta ao padrão.
        if (dadosAdmin && dadosAdmin.length > 0) {
            return dadosAdmin;
        }
        return institutosPadrao;
    }

    let baseAtual = obterBaseDeDados();

    // 3. ORDENAÇÃO POR PROXIMIDADE
    baseAtual.sort((a, b) => {
        const aProx = a.mun.toLowerCase().includes(userMun.toLowerCase()) && userMun !== "";
        const bProx = b.mun.toLowerCase().includes(userMun.toLowerCase()) && userMun !== "";
        if (aProx && !bProx) return -1;
        if (!aProx && bProx) return 1;
        return 0;
    });

    function renderCards() {
        grid.innerHTML = baseAtual.map((inst, index) => {
            const isLocal = userMun !== "" && inst.mun.toLowerCase().includes(userMun.toLowerCase());
            return `
                <div class="inst-card" onclick="abrirModal(${index})">
                    <img src="${inst.img}" class="inst-img" alt="${inst.nome}" onerror="this.src='https://via.placeholder.com/400x200?text=Logo+Indisponível'">
                    <div class="inst-content">
                        <span class="inst-name">${inst.nome}</span>
                        <span class="inst-mun">📍 ${inst.mun}</span>
                        ${isLocal ? '<span style="font-size:0.7rem; color:#28a745; font-weight:bold; display:block; margin-top:5px;">Próximo de si</span>' : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function abrirModal(index) {
        const inst = baseAtual[index];
        document.getElementById('m-nome').innerText = inst.nome;
        document.getElementById('m-loc').innerText = inst.mun;
        document.getElementById('m-site').href = inst.site;

        // Caso o Admin tenha criado um instituto sem detalhes (array vazio)
        if (!inst.detalhes || inst.detalhes.length === 0) {
            document.getElementById('m-tabela-body').innerHTML = `<tr><td colspan="4" style="text-align:center">Informações de cursos em atualização.</td></tr>`;
        } else {
            let rows = inst.detalhes.map(d => `
                <tr>
                    <td><strong>${d.curso}</strong></td>
                    <td>${d.horario || 'N/A'}</td>
                    <td>${d.carga || 'N/A'}</td>
                    <td>${d.vagas || 'N/A'}</td>
                </tr>
            `).join('');
            document.getElementById('m-tabela-body').innerHTML = rows;
        }
        
        modal.style.display = "flex";
    }

    function fecharModal() { modal.style.display = "none"; }
    window.onclick = (e) => { if (e.target == modal) fecharModal(); }

    // Iniciar
    renderCards();
</script>
